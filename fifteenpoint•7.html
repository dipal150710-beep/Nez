<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulasi UAS Geografi — Kelas 10</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --earth: #1a3a2a;
  --forest: #2d5a3d;
  --moss: #4a7c59;
  --sage: #7aaa8a;
  --mist: #b8d4c0;
  --cream: #f5f0e8;
  --sand: #e8dcc8;
  --gold: #c9a84c;
  --amber: #e8a020;
  --rust: #c25a2a;
  --sky: #3a7ab8;
  --ocean: #1e5078;
  --lava: #c0392b;
  --correct: #27ae60;
  --wrong: #e74c3c;
  --bg: #f5f0e8;
  --text: #1a2a1e;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── SCREEN SYSTEM ── */
.screen { display: none; min-height: 100vh; }
.screen.active { display: flex; }

/* ══════════════════════════════
   LANDING / KELAS SELECTION
══════════════════════════════ */
#screen-landing {
  flex-direction: column;
  align-items: center;
  justify-content: center;
  background: var(--earth);
  background-image:
    radial-gradient(ellipse at 20% 50%, rgba(45,90,61,0.6) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(26,58,42,0.8) 0%, transparent 50%),
    url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%234a7c59' fill-opacity='0.08'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  position: relative;
  overflow: hidden;
  padding: 40px 20px;
}

.landing-globe {
  font-size: 72px;
  margin-bottom: 16px;
  animation: float 3s ease-in-out infinite;
  filter: drop-shadow(0 8px 24px rgba(0,0,0,0.4));
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-12px); }
}

.landing-title {
  font-family: 'Playfair Display', serif;
  font-size: clamp(32px, 6vw, 52px);
  font-weight: 900;
  color: var(--cream);
  text-align: center;
  line-height: 1.1;
  margin-bottom: 8px;
}

.landing-sub {
  font-size: 16px;
  color: var(--sage);
  letter-spacing: 3px;
  text-transform: uppercase;
  text-align: center;
  margin-bottom: 8px;
}

.landing-desc {
  font-size: 14px;
  color: var(--mist);
  text-align: center;
  margin-bottom: 40px;
  opacity: 0.8;
}

.kelas-label {
  font-family: 'DM Mono', monospace;
  font-size: 11px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
  text-align: center;
}

.kelas-grid {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  max-width: 480px;
  width: 100%;
  margin-bottom: 32px;
}

.kelas-btn {
  background: rgba(255,255,255,0.05);
  border: 1.5px solid rgba(184,212,192,0.2);
  color: var(--mist);
  padding: 12px 8px;
  border-radius: 10px;
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.2s;
  text-align: center;
}

.kelas-btn:hover, .kelas-btn.selected {
  background: var(--moss);
  border-color: var(--sage);
  color: var(--cream);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,0,0,0.3);
}

.start-btn {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: var(--earth);
  border: none;
  padding: 16px 48px;
  border-radius: 50px;
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.25s;
  box-shadow: 0 8px 32px rgba(201,168,76,0.35);
  letter-spacing: 0.5px;
}

.start-btn:hover:not(:disabled) {
  transform: translateY(-3px);
  box-shadow: 0 14px 40px rgba(201,168,76,0.5);
}

.start-btn:disabled {
  opacity: 0.4;
  cursor: not-allowed;
}

.info-pills {
  display: flex;
  gap: 12px;
  flex-wrap: wrap;
  justify-content: center;
  margin-bottom: 32px;
}

.pill {
  background: rgba(255,255,255,0.07);
  border: 1px solid rgba(184,212,192,0.15);
  border-radius: 20px;
  padding: 6px 14px;
  font-size: 12px;
  color: var(--sage);
  font-family: 'DM Mono', monospace;
}

/* ══════════════════════════════
   EXAM SCREEN
══════════════════════════════ */
#screen-exam {
  flex-direction: column;
  min-height: 100vh;
}

.exam-header {
  background: var(--earth);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  box-shadow: 0 2px 20px rgba(0,0,0,0.2);
}

.exam-header-left {
  display: flex;
  flex-direction: column;
}

.exam-kelas-tag {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  letter-spacing: 2px;
  color: var(--sage);
  text-transform: uppercase;
}

.exam-title-sm {
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  color: var(--cream);
}

.timer-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 10px;
  padding: 8px 16px;
}

.timer-icon { font-size: 16px; }

.timer-display {
  font-family: 'DM Mono', monospace;
  font-size: 20px;
  font-weight: 500;
  color: var(--gold);
  min-width: 60px;
  text-align: center;
}

.timer-display.urgent { color: var(--rust); animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }

.progress-bar-wrap {
  height: 4px;
  background: rgba(255,255,255,0.1);
  position: relative;
}

.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--moss), var(--gold));
  transition: width 0.4s ease;
}

.exam-body {
  flex: 1;
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
  padding: 32px 20px 80px;
}

/* Section headers */
.section-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 40px 0 20px;
  padding-bottom: 12px;
  border-bottom: 2px solid var(--sand);
}

.section-header:first-child { margin-top: 0; }

.section-icon {
  width: 40px;
  height: 40px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}

.section-icon.pilgan { background: linear-gradient(135deg, var(--forest), var(--moss)); }
.section-icon.essay { background: linear-gradient(135deg, var(--ocean), var(--sky)); }
.section-icon.hitung { background: linear-gradient(135deg, #7b3f00, #c67c26); }
.section-icon.gambar { background: linear-gradient(135deg, #4a0080, #9b59b6); }

.section-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--earth);
}

.section-sub {
  font-size: 12px;
  color: #666;
  font-family: 'DM Mono', monospace;
  letter-spacing: 1px;
  margin-top: 2px;
}

/* Question cards */
.q-card {
  background: white;
  border-radius: 16px;
  padding: 24px;
  margin-bottom: 16px;
  box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  border: 1.5px solid var(--sand);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.q-card:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.1); }

.q-number {
  font-family: 'DM Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  letter-spacing: 2px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 8px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.topic-badge {
  background: var(--sand);
  color: var(--earth);
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 10px;
  font-weight: 600;
}

.topic-badge.litho { background: #fde8e8; color: #8b1a1a; }
.topic-badge.atmo  { background: #e8f0fe; color: #1a3a7a; }
.topic-badge.pedo  { background: #e8f5e8; color: #1a4a1a; }
.topic-badge.hidro { background: #e8f4fd; color: #0a3050; }
.topic-badge.ocean { background: #e0f0ff; color: #0a2040; }

.q-text {
  font-size: 15px;
  line-height: 1.6;
  color: var(--text);
  margin-bottom: 16px;
  font-weight: 400;
}

.q-text strong { color: var(--earth); }

/* Answer options */
.options-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }

.option-item {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  padding: 12px 14px;
  border-radius: 10px;
  border: 1.5px solid var(--sand);
  cursor: pointer;
  transition: all 0.15s;
  font-size: 14px;
  line-height: 1.5;
  background: var(--bg);
}

.option-item:hover { background: var(--sand); border-color: var(--sage); }

.option-item.selected { background: #e8f5e8; border-color: var(--moss); }
.option-item.correct  { background: #d4edda; border-color: var(--correct); }
.option-item.wrong    { background: #fde8e8; border-color: var(--wrong); }

.option-letter {
  width: 26px; height: 26px;
  background: white;
  border: 1.5px solid #ddd;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 12px;
  font-weight: 600;
  color: #666;
  flex-shrink: 0;
  transition: all 0.15s;
}

.option-item.selected .option-letter { background: var(--moss); border-color: var(--moss); color: white; }
.option-item.correct  .option-letter { background: var(--correct); border-color: var(--correct); color: white; }
.option-item.wrong    .option-letter { background: var(--wrong); border-color: var(--wrong); color: white; }

/* Essay textarea */
.essay-input {
  width: 100%;
  padding: 14px;
  border: 1.5px solid var(--sand);
  border-radius: 10px;
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  line-height: 1.6;
  resize: vertical;
  background: var(--bg);
  color: var(--text);
  transition: border-color 0.2s;
  min-height: 120px;
}

.essay-input:focus { outline: none; border-color: var(--moss); background: white; }

.char-count {
  text-align: right;
  font-size: 11px;
  color: #aaa;
  margin-top: 4px;
  font-family: 'DM Mono', monospace;
}

/* Gambar section */
.diagram-img {
  width: 100%;
  max-width: 500px;
  display: block;
  margin: 12px auto;
  border-radius: 10px;
  border: 2px solid var(--sand);
  background: #f0f0f0;
  min-height: 160px;
  position: relative;
  overflow: hidden;
}

/* SVG inline diagrams */
.diagram-wrap {
  background: linear-gradient(135deg, #f8f9fa, #eaf0f6);
  border-radius: 12px;
  border: 2px solid var(--sand);
  margin: 12px 0;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 16px;
}

.diagram-wrap svg { max-width: 100%; height: auto; }

/* Floating submit bar */
.submit-bar {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  background: var(--earth);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  box-shadow: 0 -4px 24px rgba(0,0,0,0.2);
  z-index: 100;
}

.answered-count {
  font-family: 'DM Mono', monospace;
  font-size: 13px;
  color: var(--sage);
}

.answered-count span { color: var(--gold); font-weight: 600; font-size: 16px; }

.submit-exam-btn {
  background: linear-gradient(135deg, var(--gold), var(--amber));
  color: var(--earth);
  border: none;
  padding: 12px 32px;
  border-radius: 50px;
  font-family: 'Playfair Display', serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  transition: all 0.2s;
}

.submit-exam-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(201,168,76,0.4); }

/* ══════════════════════════════
   RESULT SCREEN
══════════════════════════════ */
#screen-result {
  flex-direction: column;
  align-items: center;
  justify-content: flex-start;
  background: var(--bg);
  padding: 40px 20px 60px;
}

.result-card {
  background: white;
  border-radius: 24px;
  padding: 40px;
  max-width: 680px;
  width: 100%;
  box-shadow: 0 8px 48px rgba(0,0,0,0.1);
  text-align: center;
  margin-bottom: 24px;
}

.result-grade {
  width: 120px; height: 120px;
  border-radius: 50%;
  margin: 0 auto 20px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Playfair Display', serif;
  font-size: 36px;
  font-weight: 900;
  color: white;
  position: relative;
}

.result-grade.A { background: linear-gradient(135deg, #27ae60, #2ecc71); box-shadow: 0 8px 32px rgba(39,174,96,0.4); }
.result-grade.B { background: linear-gradient(135deg, #2980b9, #3498db); box-shadow: 0 8px 32px rgba(41,128,185,0.4); }
.result-grade.C { background: linear-gradient(135deg, #e67e22, #f39c12); box-shadow: 0 8px 32px rgba(230,126,34,0.4); }
.result-grade.D { background: linear-gradient(135deg, #e74c3c, #c0392b); box-shadow: 0 8px 32px rgba(231,76,60,0.4); }

.result-score-num {
  font-family: 'Playfair Display', serif;
  font-size: 52px;
  font-weight: 900;
  color: var(--earth);
  line-height: 1;
  margin-bottom: 4px;
}

.result-label {
  font-size: 14px;
  color: #888;
  margin-bottom: 24px;
}

.result-breakdown {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
  margin-bottom: 28px;
}

.breakdown-item {
  background: var(--bg);
  border-radius: 12px;
  padding: 14px 10px;
  text-align: center;
}

.breakdown-val {
  font-family: 'DM Mono', monospace;
  font-size: 22px;
  font-weight: 600;
  color: var(--earth);
  display: block;
}

.breakdown-lbl {
  font-size: 11px;
  color: #888;
  margin-top: 2px;
  letter-spacing: 0.5px;
}

.result-msg {
  font-size: 16px;
  line-height: 1.6;
  color: #555;
  margin-bottom: 28px;
}

.result-actions {
  display: flex;
  gap: 12px;
  justify-content: center;
  flex-wrap: wrap;
}

.btn-review {
  background: var(--earth);
  color: var(--cream);
  border: none;
  padding: 12px 28px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.btn-retry {
  background: white;
  color: var(--earth);
  border: 2px solid var(--sand);
  padding: 12px 28px;
  border-radius: 50px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  font-family: 'DM Sans', sans-serif;
}

.btn-review:hover { background: var(--forest); transform: translateY(-2px); }
.btn-retry:hover  { border-color: var(--moss); background: #f0f8f0; transform: translateY(-2px); }

/* Topic scores */
.topic-scores {
  background: white;
  border-radius: 16px;
  padding: 24px;
  max-width: 680px;
  width: 100%;
  box-shadow: 0 4px 24px rgba(0,0,0,0.07);
}

.topic-scores-title {
  font-family: 'Playfair Display', serif;
  font-size: 18px;
  font-weight: 700;
  color: var(--earth);
  margin-bottom: 16px;
}

.topic-row {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

.topic-name { font-size: 13px; color: #555; width: 100px; flex-shrink: 0; }

.topic-bar-bg {
  flex: 1;
  height: 8px;
  background: var(--sand);
  border-radius: 4px;
  overflow: hidden;
}

.topic-bar-fill {
  height: 100%;
  border-radius: 4px;
  transition: width 1s ease;
}

.topic-pct { font-family: 'DM Mono', monospace; font-size: 12px; color: #666; width: 36px; text-align: right; }

/* ══════════════════════════════
   REVIEW SCREEN
══════════════════════════════ */
#screen-review {
  flex-direction: column;
  padding: 0 0 60px;
}

.review-header {
  background: var(--earth);
  padding: 20px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.review-title {
  font-family: 'Playfair Display', serif;
  font-size: 20px;
  font-weight: 700;
  color: var(--cream);
}

.back-btn {
  background: rgba(255,255,255,0.1);
  border: 1px solid rgba(255,255,255,0.2);
  color: var(--cream);
  padding: 8px 18px;
  border-radius: 20px;
  font-size: 13px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all 0.2s;
}

.back-btn:hover { background: rgba(255,255,255,0.2); }

.review-body {
  max-width: 860px;
  margin: 0 auto;
  width: 100%;
  padding: 24px 20px;
}

.q-card.review-correct { border-color: #a8dbb8; }
.q-card.review-wrong { border-color: #f5b7b1; }

.answer-reveal {
  margin-top: 12px;
  padding: 12px;
  border-radius: 8px;
  font-size: 13px;
  line-height: 1.6;
}

.answer-reveal.correct { background: #d4edda; color: #155724; }
.answer-reveal.wrong   { background: #fde8e8; color: #721c24; }
.answer-reveal.essay   { background: #e8f4fd; color: #0c5460; }

.essay-answer-display {
  background: #f8f9fa;
  border: 1px solid #dee2e6;
  border-radius: 8px;
  padding: 10px;
  font-size: 13px;
  color: #555;
  margin-top: 8px;
  font-style: italic;
  white-space: pre-wrap;
}

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--mist); border-radius: 3px; }
</style>
</head>
<body>

<!-- ═══════════════ LANDING ═══════════════ -->
<div id="screen-landing" class="screen active">
  <div class="landing-globe">🌍</div>
  <div class="landing-sub">Simulasi UAS · Semester 2</div>
  <div class="landing-title">Geografi<br>Kelas 10</div>
  <div class="landing-desc">Litosfer · Atmosfer · Pedosfer · Hidrosfer · Oseanografi</div>

  <div class="info-pills">
    <div class="pill">⏱ 90 menit</div>
    <div class="pill">📝 40 Pilgan</div>
    <div class="pill">✍️ 10 Essay</div>
    <div class="pill">📊 Total 50 soal</div>
  </div>

  <div class="kelas-label">Pilih Kelas</div>
  <div class="kelas-grid" id="kelasGrid"></div>

  <button class="start-btn" id="startBtn" disabled onclick="startExam()">
    Mulai Ujian →
  </button>
</div>

<!-- ═══════════════ EXAM ═══════════════ -->
<div id="screen-exam" class="screen">
  <div class="exam-header">
    <div class="exam-header-left">
      <div class="exam-kelas-tag" id="examKelasTag">XE-1</div>
      <div class="exam-title-sm">Simulasi UAS Geografi</div>
    </div>
    <div class="timer-box">
      <span class="timer-icon">⏱</span>
      <div class="timer-display" id="timerDisplay">90:00</div>
    </div>
  </div>
  <div class="progress-bar-wrap">
    <div class="progress-bar-fill" id="progressBar" style="width:0%"></div>
  </div>
  <div class="exam-body" id="examBody"></div>
  <div class="submit-bar">
    <div class="answered-count">Dijawab: <span id="answeredCount">0</span> / 47</div>
    <button class="submit-exam-btn" onclick="submitExam()">Kumpulkan →</button>
  </div>
</div>

<!-- ═══════════════ RESULT ═══════════════ -->
<div id="screen-result" class="screen">
  <div class="result-card" id="resultCard">
    <!-- filled by JS -->
  </div>
  <div class="topic-scores" id="topicScores">
    <!-- filled by JS -->
  </div>

    ex:'1. SUNGAI BAGIAN HULU\n• Lokasi: Pegunungan/dataran tinggi, dekat sumber mata air.\n• Kecepatan arus: Sangat deras dan cepat (gradien tinggi).\n• Erosi: Dominan erosi vertikal (ke bawah), membentuk lembah berbentuk V yang sempit dan dalam.\n• Sedimentasi: Sangat sedikit; material besar (batu bongkah) terbawa arus kuat.\n• Ciri khas: Banyak air terjun, jeram, bebatuan besar.\n\n2. SUNGAI BAGIAN TENGAH\n• Lokasi: Daerah transisi antara pegunungan dan dataran rendah.\n• Kecepatan arus: Sedang, mulai melambat.\n• Erosi: Erosi lateral (ke samping) mulai dominan, sungai mulai berkelok.\n• Sedimentasi: Mulai terjadi di sisi dalam belokan sungai.\n• Ciri khas: Lembah berbentuk U, mulai terbentuk meander (belokan).\n\n3. SUNGAI BAGIAN HILIR\n• Lokasi: Dataran rendah, mendekati muara/laut.\n• Kecepatan arus: Sangat lambat (gradien rendah).\n• Erosi: Minimal; dominan sedimentasi (pengendapan).\n• Sedimentasi: Sangat besar → membentuk delta di muara, dataran banjir (flood plain).\n• Ciri khas: Sungai sangat lebar, berliku-liku (meander), air keruh karena banyak endapan.'
  },

  // ── No. 9: Singkatan BIOTW ──
  {
    type:'essay', topic:'pedo',
    q:'No. 9 — Sebutkan dan jelaskan kepanjangan dari singkatan BIOTW dalam konteks faktor-faktor pembentuk tanah!',
    ex:'BIOTW adalah singkatan dari 5 faktor utama pembentuk tanah (diperkenalkan oleh Hans Jenny, 1941):\n\nB = BAHAN INDUK (Parent Material)\nBatuan atau material asal yang mengalami pelapukan dan menjadi bahan dasar tanah. Batuan vulkanik → tanah subur; batuan gamping → tanah karst; gambut → tanah gambut.\n\nI = IKLIM (Climate)\nFaktor paling dominan. Curah hujan mempercepat pelapukan kimia; suhu tinggi mempercepat dekomposisi bahan organik. Daerah tropis basah menghasilkan tanah yang lebih tebal.\n\nO = ORGANISME (Organisms)\nMakhluk hidup (tanaman, hewan, bakteri, jamur) yang menguraikan bahan organik menjadi humus dan mempengaruhi struktur tanah. Cacing tanah menggemburkan tanah; akar tanaman mencegah erosi.\n\nT = TOPOGRAFI (Topography/Relief)\nBentuk permukaan bumi. Lereng curam → tanah tipis (mudah tererosi). Lembah/dataran → tanah tebal dan subur karena material mengendap.\n\nW = WAKTU (Time)\nLamanya proses pembentukan tanah. Tanah muda (regosol) belum berkembang lapisannya. Semakin tua, horizon tanah semakin jelas dan kompleks. Pembentukan 1 cm tanah subur membutuhkan ratusan tahun.'
  },

  // ── No. 10: Pergerakan Lempeng ──
  {
    type:'essay', topic:'litho',
    q:'No. 10 — Sebutkan dan jelaskan 3 jenis pergerakan lempeng tektonik beserta contoh nyata dan dampak yang ditimbulkan!',
    ex:'1. BATAS KONVERGEN (Saling Mendekat)\nDua lempeng bergerak saling mendekati dan bertabrakan.\n• Konvergen benua-benua: Terjadi pengangkatan → terbentuk pegunungan tinggi. Contoh: Lempeng India bertumbukan dengan Eurasia → Pegunungan Himalaya.\n• Konvergen samudra-benua: Lempeng samudra (lebih berat) menyelam ke bawah lempeng benua (subduksi) → terbentuk palung laut dan rangkaian gunung api. Contoh: Lempeng Samudra Hindia menunjam lempeng Eurasia → Palung Sunda, Gunung Merapi.\n\n2. BATAS DIVERGEN (Saling Menjauh)\nDua lempeng bergerak saling menjauh, menciptakan celah yang diisi magma.\n• Di dasar laut: Terbentuk punggung tengah samudra (mid-ocean ridge). Contoh: Mid-Atlantic Ridge → Samudra Atlantik makin melebar setiap tahun.\n• Di daratan: Terbentuk lembah retakan (rift valley). Contoh: East African Rift Valley di Afrika Timur.\n\n3. BATAS TRANSFORM (Saling Bergesekan)\nDua lempeng bergerak sejajar namun berlawanan arah. Tidak ada lempeng yang naik/turun, tapi gesekan dahsyat menghasilkan gempa bumi besar.\n• Contoh: Sesar San Andreas di California, Amerika Serikat → gempa bumi besar secara berkala.\n• Dampak: Gempa bumi kuat, tidak ada gunung api di batas ini.'
  },
];

let selectedKelas = null;
let answers = {};
let essayAnswers = {};
let timerInterval = null;
let timeLeft = 90 * 60;
let examSubmitted = false;

// ═══════════════════════════════════════════════
// LANDING
// ═══════════════════════════════════════════════

(function initKelas() {
  const grid = document.getElementById('kelasGrid');
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'kelas-btn';
    btn.textContent = `XE-${i}`;
    btn.onclick = () => selectKelas(i, btn);
    grid.appendChild(btn);
  }
})();

function selectKelas(n, btn) {
  document.querySelectorAll('.kelas-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedKelas = n;
  document.getElementById('startBtn').disabled = false;
}

function startExam() {
  if (!selectedKelas) return;
  document.getElementById('examKelasTag').textContent = `Kelas XE-${selectedKelas}`;
  showScreen('exam');
  renderExam();
  startTimer();
}

// ═══════════════════════════════════════════════
// RENDER EXAM
// ═══════════════════════════════════════════════

function topicBadge(t) {
  const map = {litho:'litho',atmo:'atmo',pedo:'pedo',hidro:'hidro',ocean:'ocean'};
  const label = {litho:'Litosfer',atmo:'Atmosfer',pedo:'Pedosfer',hidro:'Hidrosfer',ocean:'Oseanografi'};
  return `<span class="topic-badge ${map[t]}">${label[t]}</span>`;
}

function renderExam() {
  const body = document.getElementById('examBody');
  let html = '';

  // ── PILGAN ──
  html += `<div class="section-header">
    <div class="section-icon pilgan">📝</div>
    <div>
      <div class="section-title">Pilihan Ganda</div>
      <div class="section-sub">40 soal · 1 poin/soal · Pilih jawaban yang paling tepat</div>
    </div>
  </div>`;

  PILGAN.forEach((q, i) => {
    const letters = ['A','B','C','D','E'];
    const opts = q.opts.map((o, j) => `
      <li class="option-item" id="opt-${i}-${j}" onclick="selectOption(${i}, ${j})">
        <span class="option-letter">${letters[j]}</span>
        <span>${o}</span>
      </li>`).join('');
    html += `<div class="q-card" id="qcard-${i}">
      <div class="q-number">Soal ${i+1} ${topicBadge(q.topic)}</div>
      <div class="q-text">${q.q}</div>
      <ul class="options-list">${opts}</ul>
    </div>`;
  });

  // ── ESSAY ──
  html += `<div class="section-header">
    <div class="section-icon essay">✍️</div>
    <div>
      <div class="section-title">Essay & Analisis</div>
      <div class="section-sub">7 soal · Uraikan dengan lengkap dan jelas</div>
    </div>
  </div>`;

  const hitungQs = ESSAY.filter(e=>e.type==='hitung');
  const gambarQs = ESSAY.filter(e=>e.type==='gambar');
  const essayQs  = ESSAY.filter(e=>e.type==='essay');

  let eIdx = 0;

  // Hitungan
  html += `<div style="background:linear-gradient(135deg,#7b3f00,#c67c26);color:white;border-radius:10px;padding:8px 14px;margin:16px 0 8px;font-size:13px;font-weight:600;display:inline-block;">🔢 Soal Hitungan</div>`;
  hitungQs.forEach(q => {
    const ei = eIdx++;
    html += `<div class="q-card" id="ecard-${ei}">
      <div class="q-number">Soal H${ei+1} ${topicBadge(q.topic)}</div>
      <div class="q-text">${q.q}</div>
      <textarea class="essay-input" id="essay-${ei}" placeholder="Tuliskan langkah-langkah perhitungan di sini..." rows="5"
        oninput="updateEssay(${ei}, this.value)"></textarea>
      <div class="char-count" id="cc-${ei}">0 karakter</div>
    </div>`;
  });

  // Gambar
  html += `<div style="background:linear-gradient(135deg,#4a0080,#9b59b6);color:white;border-radius:10px;padding:8px 14px;margin:16px 0 8px;font-size:13px;font-weight:600;display:inline-block;">🗺️ Soal Gambar / Diagram</div>`;
  gambarQs.forEach(q => {
    const ei = eIdx++;
    html += `<div class="q-card" id="ecard-${ei}">
      <div class="q-number">Soal G${gambarQs.indexOf(q)+1} ${topicBadge(q.topic)}</div>
      <div class="q-text">${q.q}</div>
      <div class="diagram-wrap">${getDiagram(q.diagram)}</div>
      <textarea class="essay-input" id="essay-${ei}" placeholder="Tuliskan analisis dan penjelasanmu di sini..." rows="5"
        oninput="updateEssay(${ei}, this.value)"></textarea>
      <div class="char-count" id="cc-${ei}">0 karakter</div>
    </div>`;
  });

  // Essay biasa
  html += `<div style="background:linear-gradient(135deg,#1e5078,#3a7ab8);color:white;border-radius:10px;padding:8px 14px;margin:16px 0 8px;font-size:13px;font-weight:600;display:inline-block;">📖 Soal Uraian</div>`;
  essayQs.forEach(q => {
    const ei = eIdx++;
    html += `<div class="q-card" id="ecard-${ei}">
      <div class="q-number">Soal U${essayQs.indexOf(q)+1} ${topicBadge(q.topic)}</div>
      <div class="q-text">${q.q}</div>
      <textarea class="essay-input" id="essay-${ei}" placeholder="Tuliskan jawabanmu dengan lengkap dan sistematis..." rows="6"
        oninput="updateEssay(${ei}, this.value)"></textarea>
      <div class="char-count" id="cc-${ei}">0 karakter</div>
    </div>`;
  });

  body.innerHTML = html;
  updateAnsweredCount();
}

function selectOption(qIdx, optIdx) {
  if (examSubmitted) return;
  const prev = answers[qIdx];
  if (prev !== undefined) {
    document.getElementById(`opt-${qIdx}-${prev}`)?.classList.remove('selected');
  }
  answers[qIdx] = optIdx;
  document.getElementById(`opt-${qIdx}-${optIdx}`)?.classList.add('selected');
  updateAnsweredCount();
  updateProgress();
}

function updateEssay(ei, val) {
  essayAnswers[ei] = val;
  const cc = document.getElementById(`cc-${ei}`);
  if (cc) cc.textContent = val.length + ' karakter';
  updateAnsweredCount();
  updateProgress();
}

function updateAnsweredCount() {
  const pilganDone = Object.keys(answers).length;
  const essayDone = Object.values(essayAnswers).filter(v => v && v.trim().length > 0).length;
  const total = pilganDone + essayDone;
  document.getElementById('answeredCount').textContent = total;
}

function updateProgress() {
  const pilganDone = Object.keys(answers).length;
  const essayDone = Object.values(essayAnswers).filter(v => v && v.trim().length > 0).length;
  const total = pilganDone + essayDone;
  const pct = (total / 47) * 100;
  document.getElementById('progressBar').style.width = pct + '%';
}

// ═══════════════════════════════════════════════
// TIMER
// ═══════════════════════════════════════════════

function startTimer() {
  timerInterval = setInterval(() => {
    timeLeft--;
    const m = Math.floor(timeLeft / 60);
    const s = timeLeft % 60;
    const display = document.getElementById('timerDisplay');
    if (display) {
      display.textContent = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
      display.classList.toggle('urgent', timeLeft <= 300);
    }
    if (timeLeft <= 0) { clearInterval(timerInterval); submitExam(); }
  }, 1000);
}

// ═══════════════════════════════════════════════
// SUBMIT & SCORE
// ═══════════════════════════════════════════════

function submitExam() {
  if (examSubmitted) return;
  examSubmitted = true;
  clearInterval(timerInterval);

  // Score pilgan
  let correct = 0;
  const topicCorrect = {litho:0,atmo:0,pedo:0,hidro:0,ocean:0};
  const topicTotal   = {litho:0,atmo:0,pedo:0,hidro:0,ocean:0};

  PILGAN.forEach((q, i) => {
    topicTotal[q.topic]++;
    if (answers[i] === q.ans) { correct++; topicCorrect[q.topic]++; }
  });

  const pilganScore = correct * 1; // 40 pts max
  const essayScore  = Object.values(essayAnswers).filter(v => v && v.trim().length > 30).length * 8.57; // ~60 pts max for 7 essays
  const totalScore  = Math.min(100, Math.round(pilganScore + essayScore));

  let grade = 'D';
  if (totalScore >= 90) grade = 'A';
  else if (totalScore >= 75) grade = 'B';
  else if (totalScore >= 60) grade = 'C';

  const msgs = {
    A: '🎉 Luar biasa! Kamu sudah sangat menguasai materi geografi semester ini.',
    B: '👍 Bagus! Masih ada beberapa topik yang bisa diperdalam lagi.',
    C: '📚 Cukup baik. Perlu lebih banyak berlatih soal dan membaca materi.',
    D: '💪 Jangan menyerah! Ulangi lagi materinya dan coba lagi ya.'
  };

  const pilganDone = Object.keys(answers).length;
  const essayDone = Object.values(essayAnswers).filter(v => v && v.trim().length > 0).length;

  document.getElementById('resultCard').innerHTML = `
    <div class="result-grade ${grade}">${grade}</div>
    <div class="result-score-num">${totalScore}</div>
    <div class="result-label">Skor dari 100 · Kelas XE-${selectedKelas}</div>
    <div class="result-breakdown">
      <div class="breakdown-item">
        <span class="breakdown-val">${correct}/40</span>
        <div class="breakdown-lbl">Pilgan Benar</div>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-val">${essayDone}/7</span>
        <div class="breakdown-lbl">Essay Diisi</div>
      </div>
      <div class="breakdown-item">
        <span class="breakdown-val">${formatTime(90*60 - timeLeft)}</span>
        <div class="breakdown-lbl">Waktu Dipakai</div>
      </div>
    </div>
    <div class="result-msg">${msgs[grade]}</div>
    <div class="result-actions">
      <button class="btn-review" onclick="showReview()">📋 Lihat Pembahasan</button>
      <button class="btn-retry" onclick="retryExam()">🔄 Coba Lagi</button>
    </div>`;

  // Topic bars
  const topicNames = {litho:'Litosfer',atmo:'Atmosfer',pedo:'Pedosfer',hidro:'Hidrosfer',ocean:'Oseanografi'};
  const topicColors = {litho:'#e74c3c',atmo:'#3498db',pedo:'#27ae60',hidro:'#1abc9c',ocean:'#2980b9'};
  let tbHtml = `<div class="topic-scores-title">Skor Per Topik (Pilgan)</div>`;
  for (const [t, name] of Object.entries(topicNames)) {
    const pct = topicTotal[t] ? Math.round((topicCorrect[t]/topicTotal[t])*100) : 0;
    tbHtml += `<div class="topic-row">
      <div class="topic-name">${name}</div>
      <div class="topic-bar-bg"><div class="topic-bar-fill" style="width:${pct}%;background:${topicColors[t]}"></div></div>
      <div class="topic-pct">${topicCorrect[t]}/${topicTotal[t]}</div>
    </div>`;
  }
  document.getElementById('topicScores').innerHTML = tbHtml;

  showScreen('result');
}

function formatTime(sec) {
  const m = Math.floor(sec/60), s = sec%60;
  return `${m}m ${s}s`;
}

// ═══════════════════════════════════════════════
// REVIEW
// ═══════════════════════════════════════════════

function showReview() {
  const letters = ['A','B','C','D','E'];
  let html = '';

  html += `<div class="section-header" style="margin-top:0">
    <div class="section-icon pilgan">📝</div>
    <div><div class="section-title">Pembahasan Pilihan Ganda</div></div>
  </div>`;

  PILGAN.forEach((q, i) => {
    const userAns = answers[i];
    const correct = userAns === q.ans;
    const status = userAns === undefined ? 'review-unanswered' : (correct ? 'review-correct' : 'review-wrong');
    const optsList = q.opts.map((o, j) => {
      let cls = '';
      if (j === q.ans) cls = 'correct';
      else if (j === userAns && !correct) cls = 'wrong';
      return `<li class="option-item ${cls}">
        <span class="option-letter">${letters[j]}</span>
        <span>${o}</span>
      </li>`;
    }).join('');

    html += `<div class="q-card ${status}">
      <div class="q-number">Soal ${i+1} ${topicBadge(q.topic)} ${correct?'✅':'❌'}</div>
      <div class="q-text">${q.q}</div>
      <ul class="options-list">${optsList}</ul>
      <div class="answer-reveal ${correct?'correct':'wrong'}">
        <strong>${correct ? '✅ Benar!' : `❌ Jawaban kamu: ${userAns !== undefined ? letters[userAns] : 'Tidak dijawab'} · Jawaban benar: ${letters[q.ans]}`}</strong><br>
        ${q.ex}
      </div>
    </div>`;
  });

  html += `<div class="section-header">
    <div class="section-icon essay">✍️</div>
    <div><div class="section-title">Pembahasan Essay</div></div>
  </div>`;

  ESSAY.forEach((q, ei) => {
    const userAns = essayAnswers[ei] || '';
    const typeLabel = q.type==='hitung'?'🔢 Hitungan':(q.type==='gambar'?'🗺️ Gambar':'📖 Uraian');
    html += `<div class="q-card">
      <div class="q-number">${typeLabel} ${topicBadge(q.topic)}</div>
      <div class="q-text">${q.q}</div>
      ${q.diagram ? `<div class="diagram-wrap">${getDiagram(q.diagram)}</div>` : ''}
      ${userAns ? `<div class="essay-answer-display">📝 Jawaban kamu:<br>${userAns}</div>` : '<div style="color:#aaa;font-size:13px;margin:8px 0">⚠️ Tidak dijawab</div>'}
      <div class="answer-reveal essay">
        <strong>💡 Kunci Jawaban / Pembahasan:</strong><br>
        <pre style="white-space:pre-wrap;font-family:DM Sans,sans-serif;font-size:13px;margin-top:6px">${q.ex}</pre>
      </div>
    </div>`;
  });

  document.getElementById('reviewBody').innerHTML = html;
  showScreen('review');
}

function showResult() {
  showScreen('result');
}

function retryExam() {
  examSubmitted = false;
  answers = {};
  essayAnswers = {};
  timeLeft = 90 * 60;
  clearInterval(timerInterval);
  document.getElementById('timerDisplay').textContent = '90:00';
  document.getElementById('timerDisplay').classList.remove('urgent');
  showScreen('landing');
}

// ═══════════════════════════════════════════════
// SCREEN MANAGER
// ═══════════════════════════════════════════════

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(`screen-${name}`).classList.add('active');
  window.scrollTo(0, 0);
}
</script>
